spring:
  application:
    name: ShulkerSync

  datasource:
    url: jdbc:mysql://localhost:3306/shulker_sync?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: jms20041105

    type: com.zaxxer.hikari.HikariDataSource
    # 连接池配置
    hikari:
      # 连接池中允许的最小空闲连接数
      minimum-idle: 5
      # 连接池维护的最大连接数
      maximum-pool-size: 20
      # 连接超时时间（毫秒）
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: xyz.saturnhalo.domain.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true